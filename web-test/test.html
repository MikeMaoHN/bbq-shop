<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>测试新增地址按钮</title>
<style>
body { font-family: sans-serif; padding: 20px; }
button { padding: 10px 20px; font-size: 14px; cursor: pointer; }
.red-btn { background: #e74c3c; color: #fff; border: none; border-radius: 15px; }
</style>
</head>
<body>
<h2>测试新增地址按钮</h2>

<button onclick="testClick()" class="red-btn">测试按钮 1（直接调用）</button>
<button onclick="showAddAddressFromCheckout()" class="red-btn">测试按钮 2（调用目标函数）</button>

<div id="addressForm" style="display:none; margin-top:20px; padding:20px; border:1px solid #ddd;">
  <h3>地址表单</h3>
  <p>✅ 表单已打开！</p>
  <button onclick="document.getElementById('addressForm').style.display='none'">关闭</button>
</div>

<script>
function testClick() {
  console.log('测试按钮 1 被点击');
  alert('测试按钮 1 可以点击！');
}

function showAddAddressFromCheckout() {
  console.log('showAddAddressFromCheckout 被调用');
  document.getElementById('addressForm').style.display = 'block';
  alert('✅ 新增地址表单已打开！');
}
</script>
</body>
</html>

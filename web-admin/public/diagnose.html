<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>商品管理诊断</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        h1 { color: #303133; border-bottom: 2px solid #409EFF; padding-bottom: 10px; }
        .section { margin: 20px 0; padding: 15px; background: #fafafa; border-radius: 4px; }
        .success { color: #67C23A; font-weight: bold; }
        .error { color: #F56C6C; font-weight: bold; }
        .warning { color: #E6A23C; font-weight: bold; }
        .info { color: #909399; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #EBEEF5; }
        th { background: #F5F7FA; color: #606266; font-weight: 600; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .badge-success { background: #f0f9eb; color: #67C23A; }
        .badge-danger { background: #fef0f0; color: #F56C6C; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 商品管理页面诊断工具</h1>
        
        <div class="section">
            <h3>步骤 1: 测试登录</h3>
            <div id="step1" class="info">正在测试...</div>
        </div>
        
        <div class="section">
            <h3>步骤 2: 测试商品 API</h3>
            <div id="step2" class="info">等待登录完成...</div>
        </div>
        
        <div class="section">
            <h3>步骤 3: 对比两个页面数据</h3>
            <div id="step3" class="info">等待 API 测试完成...</div>
        </div>
        
        <div class="section">
            <h3>📦 商品列表（共 <span id="totalCount">0</span> 个）</h3>
            <table id="productTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>名称</th>
                        <th>分类</th>
                        <th>价格</th>
                        <th>库存</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        
        <div class="section">
            <h3>🔧 诊断结论</h3>
            <div id="conclusion" class="info">等待诊断完成...</div>
        </div>
    </div>
    
    <script>
    async function diagnose() {
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step3 = document.getElementById('step3');
        const conclusion = document.getElementById('conclusion');
        const tbody = document.querySelector('#productTable tbody');
        
        try {
            // Step 1: 登录
            step1.innerHTML = '正在登录...';
            const loginRes = await fetch('/admin/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: 'admin', password: 'admin123' })
            });
            const loginData = await loginRes.json();
            
            if (loginData.code === 200) {
                step1.innerHTML = '<span class="success">✅ 登录成功</span> - Token 已获取';
                const token = loginData.data.token;
                
                // Step 2: 测试商品 API
                step2.innerHTML = '正在获取商品列表...';
                const productsRes = await fetch('/admin/api/products?page=1&limit=50', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const productsData = await productsRes.json();
                
                if (productsData.code === 200) {
                    const count = productsData.data.total;
                    const listCount = productsData.data.list.length;
                    step2.innerHTML = `<span class="success">✅ API 请求成功</span> - 商品总数：${count}, 返回：${listCount}个`;
                    document.getElementById('totalCount').textContent = count;
                    
                    // 显示商品列表
                    productsData.data.list.forEach(p => {
                        const row = `<tr>
                            <td>${p.id}</td>
                            <td>${p.name}</td>
                            <td>${p.category_name || '-'}</td>
                            <td>¥${(p.price/100).toFixed(2)}</td>
                            <td><span class="badge ${p.stock > 0 ? 'badge-success' : 'badge-danger'}">${p.stock}件</span></td>
                            <td>${p.status === 1 ? '✅ 可售' : '❌ 下架'}</td>
                        </tr>`;
                        tbody.innerHTML += row;
                    });
                    
                    // Step 3: 诊断
                    step3.innerHTML = '<span class="success">✅ 两个页面都使用相同的 API：api.getProducts()</span>';
                    
                    // 结论
                    if (count > 0) {
                        conclusion.innerHTML = `
                            <p><span class="success">✅ 后端 API 正常</span> - 数据库有 ${count} 个商品</p>
                            <p><span class="success">✅ 前端 API 调用正常</span> - 两个页面都调用 api.getProducts()</p>
                            <p class="warning">⚠️ 如果商品管理页面仍然不显示，可能是：</p>
                            <ul>
                                <li>浏览器缓存问题 - 请按 <strong>Ctrl+F5</strong> 强制刷新</li>
                                <li>Vite 热更新失败 - 请重启开发服务器</li>
                                <li>Vue 组件渲染问题 - 请检查 F12 控制台错误</li>
                            </ul>
                            <p><strong>建议操作：</strong></p>
                            <ol>
                                <li>打开商品管理页面 http://localhost:3001/#/products</li>
                                <li>按 F12 打开开发者工具</li>
                                <li>查看 Console 控制台，查找 "=== 开始加载商品 ===" 日志</li>
                                <li>如果没有日志，说明组件没有加载，需要清除缓存</li>
                            </ol>
                        `;
                    } else {
                        conclusion.innerHTML = '<span class="error">❌ 数据库没有商品，请先添加商品</span>';
                    }
                } else {
                    step2.innerHTML = `<span class="error">❌ API 请求失败</span> - ${productsData.message}`;
                    conclusion.innerHTML = `<span class="error">❌ 后端 API 错误：${productsData.message}</span>`;
                }
            } else {
                step1.innerHTML = `<span class="error">❌ 登录失败</span> - ${loginData.message}`;
                conclusion.innerHTML = `<span class="error">❌ 无法登录，请检查后端服务是否正常</span>`;
            }
        } catch (e) {
            step1.innerHTML = `<span class="error">❌ 异常</span> - ${e.message}`;
            conclusion.innerHTML = `<span class="error">❌ 诊断过程出错：${e.message}</span><p>请检查后端服务是否运行在 http://localhost:3000</p>`;
        }
    }
    
    diagnose();
    </script>
</body>
</html>
